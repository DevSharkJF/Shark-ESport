<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Esports</title>
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Math&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="./assets/logo.png" alt="Logo da Imagem" width="35%" style="padding-top: 0%;">
    </header>

    <main>
        <section>
            <div>
                <center>
                    <h2>Assistente de Jogos</h2>
                    <p>
                        Utilize o assistente virtual do Gemini para conseguir dicas,
                        estratégias e builds dos seus jogos favoritos.
                    </p>
                </center>

                <form id="form">
                    <input type="password" id="apiKey" style="width: 50%;" placeholder="Digite a API KEY do GEMINI">
                    <select name="" id="gameSelect" style="width: 35%;">
                        <option value="" disable selected style="background-color: rgba(53, 50, 50, 0.452); color: white;">Selecione um Jogo</option>
                        <option value="gta">GTA</option>
                        <option value="cs">CS2</option>
                        <option value="wow">World of Warcraft</option>
                        <option value="witcher">The Witcher</option>
                        <option value="crew">The Crew 2</option>
                        <option value="bg3">Baldurs Gate 3</option>
                        <option value="forza">Forza</option>
                        <option value="cod">Call of Duty</option>
                        <option value="valorant">Valorant</option>
                        <option value="skyrin">The Elder Scrolls V</option>
                        <option value="rd2">Read Dead Redemption 2</option>
                        <option value="pubg">PUBG</option>
                    </select>

                    <textarea name="" id="questionInput" style="width: 100%;" placeholder="Builds, Dicas e Estratégias"></textarea>
                    <button id="askButton">PERGUNTAR</button>
                    <div id="aiResponse" hidden>
                        <div class="response-content"></div>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <script src="https://unpkg.com/showdown/dist/showdown.min.js"></script>
    <script src="./assets/script.js"></script>
</body>
</html>
