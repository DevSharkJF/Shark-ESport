<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Esports</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <header>
        <img src="./assets/logo.png" alt="Logo da Imagem">
    </header>

    <main>
        <section>
            <div>
                <center>
                    <h2>Assistente de Jogos</h2>
                    <p>
                        Utilize o assistente virtual do Gemini para conseguir dicas,
                        estratégias, dicas e builds dos seus jogos favoritos.
                    </p>
                </center>

                <form id="form">
                    <input type="password" id="apiKey" style="width: 50%;" placeholder="Digite a API KEY do GEMINI">
                    <select name="" id="gameSelect" style="width: 35%;">
                        <option value="" disable selected>Selecione um Jogo</option>
                        <option value="gta">GTA</option>
                        <option value="cs">CS2</option>
                        <option value="wow">World of Warcraft</option>
                        <option value="witcher">The Witcher</option>
                        <option value="crew">The Crew 2</option>
                    </select>

                    <textarea name="" id="questionInput" style="width: 100%;" placeholder="Builds, Dicas e Estratégias"></textarea>
                    <button id="askButton">PERGUNTAR</button>
                    <div id="aiResponse" hidden>
                        <div class="response-content"></div>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <script src="./assets/script.js"></script>
</body>
</html>
